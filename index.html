        .topper-rank-1 td:first-child::before { content: '🥇 '; }
        .topper-rank-2 td:first-child::before { content: '🥈 '; }
        .topper-rank-3 td:first-child::before { content: '🥉 '; }

        /* ── ERROR ── */
        #errorMessage {
            border-radius: 8px;
            font-size: 0.88rem;
        }

        /* ── SETTINGS PANEL (Side Menu) ── */
        .side-menu {
            width: 0;
            position: fixed;
            z-index: 1050;
            top: 0; right: 0;
            height: 100vh;
            background: #fff;
            overflow-x: hidden;
            overflow-y: auto;
            transition: width 0.3s ease;
            padding-top: 64px;
            border-left: 1px solid var(--border);
            box-shadow: -4px 0 20px rgba(13,27,62,0.15);
        }
        .side-menu.open { width: 300px; }
        .side-menu .close-btn {
            position: absolute;
            top: 68px; right: 16px;
            font-size: 1.4rem;
            text-decoration: none;
            color: var(--text-dark);
            line-height: 1;
            z-index: 2;
            background: var(--cream);
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            border: 1px solid var(--border);
        }
        .side-menu-content { padding: 1rem 1.25rem; }
        .side-menu-content .settings-section-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 1rem 0 0.6rem;
        }
        .side-menu-content .form-check { margin-bottom: 0.5rem; }
        .side-menu-content .form-check-label { font-size: 0.84rem; color: var(--text-dark); }
        .side-menu-content .form-check-input:checked { background-color: var(--saffron); border-color: var(--saffron); }
        .side-menu-content .btn-side {
            width: 100%;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0.5rem;
            margin-top: 0.5rem;
            border: 1.5px solid var(--border);
            background: var(--cream);
            color: var(--text-dark);
            transition: all 0.2s;
        }
        .side-menu-content .btn-side:hover { border-color: var(--saffron); color: var(--saffron); background: #fff; }

        #openSideMenuBtn {
            display: none; /* moved into drawer */
        }
        #telegramBtn {
            position: fixed;
            bottom: 24px; right: 24px;
            z-index: 1060;
            background: #229ED9;
            color: #fff;
            border: none;
            width: 48px; height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 16px rgba(34,158,217,0.4);
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
        }
        #telegramBtn:hover { background: #1a8bbf; transform: scale(1.08); color: #fff; }

        body.side-menu-open { }

        /* ── WATERMARK ── */
        .watermark {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-family: 'Rajdhani', sans-serif;
            font-size: 3.5em;
            color: rgba(13,27,62,0.06);
            z-index: -1;
            pointer-events: none;
            white-space: nowrap;
        }

        /* ── FOOTER ── */
        footer {
            margin-top: auto;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: #fff;
        }
        footer a { color: var(--saffron); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        footer strong { color: var(--navy); }

        /* ── PREVIOUS RESULTS TABLE ── */
        .prev-table {
            width: 100%;
            font-size: 0.82rem;
            border-collapse: collapse;
        }
        .prev-table th {
            padding: 6px 10px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            text-align: left;
        }
        .prev-table td {
            padding: 7px 10px;
            border-bottom: 1px solid #EDE8DF;
            color: var(--text-dark);
        }
        .prev-table tr:last-child td { border-bottom: none; }
        .btn-recheck {
            background: var(--navy);
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 3px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-recheck:hover { background: var(--saffron); }

        /* ── MARKSHEET MODAL ── */
        .marksheet-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .marksheet-overlay.open { display: flex; }

        .marksheet-card {
            background: #fff;
            border-radius: 12px;
            width: 100%;
            max-width: 520px;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
            position: relative;
            font-family: 'Noto Sans', sans-serif;
            font-size: 12px;
        }
